<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Погода</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0f1e;--card:#111827;--card2:#0f1729;
  --accent:#60a5fa;--accent2:#3b82f6;
  --text:#f1f5f9;--text2:#94a3b8;--border:#1e293b;
  --sun:#fbbf24;--rain:#60a5fa;--snow:#e2e8f0;--storm:#a78bfa;
  --font:'DM Sans',sans-serif;
}
html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:var(--font)}
body{display:flex;flex-direction:column;align-items:center;padding:40px 16px}

h1{font-size:28px;font-weight:300;letter-spacing:1px;margin-bottom:32px;color:var(--text2)}
h1 span{color:var(--text);font-weight:500}

/* поиск */
.search{display:flex;gap:10px;width:100%;max-width:480px;margin-bottom:32px}
.search input{
  flex:1;padding:12px 18px;background:var(--card);
  border:1px solid var(--border);border-radius:12px;
  color:var(--text);font-size:15px;font-family:var(--font);outline:none;transition:.2s;
}
.search input:focus{border-color:var(--accent)}
.search input::placeholder{color:var(--text2)}
.search button{
  padding:12px 22px;background:var(--accent2);border:none;border-radius:12px;
  color:#fff;font-size:15px;font-weight:500;font-family:var(--font);
  cursor:pointer;transition:.15s;white-space:nowrap;
}
.search button:hover{background:var(--accent)}
.search button:active{transform:scale(.97)}

/* карточка погоды */
.weather-card{
  width:100%;max-width:480px;background:var(--card);
  border:1px solid var(--border);border-radius:20px;
  padding:32px;display:none;animation:up .3s ease;
}
@keyframes up{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
.city-name{font-size:13px;color:var(--text2);letter-spacing:.5px;margin-bottom:4px}
.city-main{font-size:26px;font-weight:500;margin-bottom:24px}
.weather-main{display:flex;align-items:center;gap:20px;margin-bottom:28px}
.weather-icon{font-size:64px;line-height:1}
.temp-block{}
.temp{font-size:56px;font-weight:300;line-height:1;letter-spacing:-2px}
.temp sup{font-size:24px;font-weight:400;vertical-align:super;color:var(--text2)}
.desc{font-size:15px;color:var(--text2);margin-top:6px;text-transform:capitalize}
.feels{font-size:13px;color:var(--text2);margin-top:4px}

/* детали */
.details{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px}
.detail{background:var(--card2);border-radius:12px;padding:14px 16px}
.detail-label{font-size:11px;color:var(--text2);letter-spacing:.4px;margin-bottom:4px}
.detail-value{font-size:18px;font-weight:500}
.detail-unit{font-size:12px;color:var(--text2);font-weight:400;margin-left:2px}

/* прогноз */
.forecast-title{font-size:12px;color:var(--text2);letter-spacing:.4px;margin-bottom:12px}
.forecast{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px}
.forecast::-webkit-scrollbar{height:3px}
.forecast::-webkit-scrollbar-thumb{background:var(--border)}
.fc-item{
  flex-shrink:0;background:var(--card2);border-radius:10px;
  padding:12px 14px;text-align:center;min-width:64px;
}
.fc-time{font-size:11px;color:var(--text2);margin-bottom:6px}
.fc-icon{font-size:20px;margin-bottom:6px}
.fc-temp{font-size:14px;font-weight:500}

/* ошибка */
.error{
  color:#f87171;font-size:14px;text-align:center;
  padding:16px;background:#1f0a0a;border:1px solid #3f1515;
  border-radius:12px;max-width:480px;width:100%;display:none;
  animation:up .2s ease;
}

/* лоадер */
.loader{
  width:32px;height:32px;border:2px solid var(--border);
  border-top-color:var(--accent);border-radius:50%;
  animation:spin .7s linear infinite;display:none;margin:20px auto;
}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<h1>вibe<span>weather</span></h1>

<div class="search">
  <input type="text" id="cityInput" placeholder="Введите город… Москва, London, Tokyo"
    onkeydown="if(event.key==='Enter')getWeather()"/>
  <button onclick="getWeather()">Найти</button>
</div>

<div class="loader" id="loader"></div>
<div class="error" id="error"></div>

<div class="weather-card" id="card">
  <div class="city-name" id="country"></div>
  <div class="city-main" id="cityName"></div>

  <div class="weather-main">
    <div class="weather-icon" id="icon"></div>
    <div class="temp-block">
      <div class="temp" id="temp">—<sup>°C</sup></div>
      <div class="desc" id="desc"></div>
      <div class="feels" id="feels"></div>
    </div>
  </div>

  <div class="details">
    <div class="detail">
      <div class="detail-label">ВЛАЖНОСТЬ</div>
      <div class="detail-value" id="humidity">—<span class="detail-unit">%</span></div>
    </div>
    <div class="detail">
      <div class="detail-label">ВЕТЕР</div>
      <div class="detail-value" id="wind">—<span class="detail-unit">м/с</span></div>
    </div>
    <div class="detail">
      <div class="detail-label">ДАВЛЕНИЕ</div>
      <div class="detail-value" id="pressure">—<span class="detail-unit">гПа</span></div>
    </div>
    <div class="detail">
      <div class="detail-label">ВИДИМОСТЬ</div>
      <div class="detail-value" id="visibility">—<span class="detail-unit">км</span></div>
    </div>
  </div>

  <div class="forecast-title">ПРОГНОЗ НА 24 ЧАСА</div>
  <div class="forecast" id="forecast"></div>
</div>

<script>
const API = 'http://localhost:8000';

function getIcon(icon) {
  const map = {
    'clear-day': '☀', 'clear-night': '🌙',
    'partly-cloudy-day': '🌤', 'partly-cloudy-night': '🌙',
    'cloudy': '☁', 'overcast': '☁',
    'rain': '🌧', 'showers-day': '🌦', 'showers-night': '🌦',
    'thunder-rain': '⛈', 'thunder-showers-day': '⛈',
    'snow': '❄', 'snow-showers-day': '🌨',
    'fog': '🌫', 'wind': '💨',
  };
  return map[icon] || '🌡';
}

async function getWeather() {
  const city  = document.getElementById('cityInput').value.trim();
  const today = new Date().toISOString().split('T')[0]; // 2026-03-17
  if (!city) return;

  show('loader'); hide('error'); hide('card');

  try {
    const res = await fetch(`${API}/weather?city=${encodeURIComponent(city)}&today=${today}`);
    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.detail || 'Ошибка');
    }
    const data = await res.json();
    hide('loader');
    render(data);
  } catch(e) {
    hide('loader');
    showErr(e.message || 'Что-то пошло не так');
  }
}

function render(data) {
  const day     = data.days[0];
  const current = data.currentConditions;

  document.getElementById('country').textContent  = data.timezone;
  document.getElementById('cityName').textContent = data.resolvedAddress;
  document.getElementById('icon').textContent     = getIcon(current.icon);
  document.getElementById('temp').innerHTML       = `${Math.round(current.temp)}<sup>°C</sup>`;
  document.getElementById('desc').textContent     = current.conditions;
  document.getElementById('feels').textContent    = `Ощущается как ${Math.round(current.feelslike)}°`;
  document.getElementById('humidity').innerHTML   = `${Math.round(current.humidity)}<span class="detail-unit">%</span>`;
  document.getElementById('wind').innerHTML       = `${Math.round(current.windspeed)}<span class="detail-unit">км/ч</span>`;
  document.getElementById('pressure').innerHTML   = `${Math.round(current.pressure)}<span class="detail-unit">гПа</span>`;
  document.getElementById('visibility').innerHTML = `${Math.round(current.visibility)}<span class="detail-unit">км</span>`;

  // прогноз по часам из days[0].hours
  const fc = document.getElementById('forecast');
  fc.innerHTML = '';
  day.hours.filter((_, i) => i % 3 === 0).forEach(h => {
    const d = document.createElement('div');
    d.className = 'fc-item';
    d.innerHTML = `
      <div class="fc-time">${h.datetime.slice(0,5)}</div>
      <div class="fc-icon">${getIcon(h.icon)}</div>
      <div class="fc-temp">${Math.round(h.temp)}°</div>`;
    fc.appendChild(d);
  });

  show('card');
}

function show(id)    { document.getElementById(id).style.display = 'block'; }
function hide(id)    { document.getElementById(id).style.display = 'none'; }
function showErr(msg){ const e = document.getElementById('error'); e.textContent = msg; e.style.display = 'block'; }
</script>
</body>
</html>
